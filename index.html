<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공유오피스 모던워크 | Modernwork</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal: #4ECDC4;
    --teal-dark: #0F6E56;
    --bg: #0e1c1b;
    --bg2: #152422;
    --text: #e8f0ef;
    --muted: rgba(232,240,239,0.45);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* 배경 영상 */
  .video-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.22;
    z-index: 0;
    pointer-events: none;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, var(--bg) 0%, transparent 30%, transparent 70%, var(--bg) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 헤더 */
  .header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 64px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.1s;
  }

  .logo-wrap {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--bg2);
    border: 1.5px solid rgba(78,205,196,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    position: relative;
  }
  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(78,205,196,0.1);
  }

  .logo-wrap svg { width: 48px; height: 48px; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .brand-kr {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  .divider {
    width: 32px; height: 1px;
    background: var(--teal);
    margin: 16px auto 0;
    opacity: 0.6;
  }

  /* 주소 */
  .address-block {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 32px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.25s;
  }
  .address-block svg { flex-shrink: 0; }

  /* 연락처 인라인 버튼 */
  .contact-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.35s;
  }

  .contact-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 0;
    border-radius: 10px;
    background: var(--bg2);
    border: 1px solid rgba(78,205,196,0.18);
    color: var(--text);
    font-size: 13px;
    font-weight: 400;
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .contact-btn:hover {
    background: rgba(78,205,196,0.08);
    border-color: rgba(78,205,196,0.45);
    transform: translateY(-1px);
  }
  .contact-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* 링크 버튼들 */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-radius: 12px;
    background: var(--bg2);
    border: 1px solid rgba(78,205,196,0.15);
    color: var(--text);
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }
  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--teal);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .link-btn:hover {
    background: rgba(78,205,196,0.07);
    border-color: rgba(78,205,196,0.4);
    transform: translateY(-2px);
  }
  .link-btn:hover::before { opacity: 1; }

  .link-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    background: rgba(78,205,196,0.1);
    display: flex; align-items: center; justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
  }
  .link-icon svg { width: 18px; height: 18px; }

  .link-text { flex: 1; }
  .link-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: 0.2px;
  }
  .link-desc {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 16px;
    margin-left: 8px;
  }

  /* 애니메이션 딜레이 */
  .link-btn:nth-child(1) { animation: fadeUp 0.6s ease forwards 0.4s; }
  .link-btn:nth-child(2) { animation: fadeUp 0.6s ease forwards 0.5s; }
  .link-btn:nth-child(3) { animation: fadeUp 0.6s ease forwards 0.6s; }
  .link-btn:nth-child(4) { animation: fadeUp 0.6s ease forwards 0.7s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .footer {
    margin-top: 40px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
