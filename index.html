<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공유오피스 모던워크 | Modernwork</title>
<meta property="og:title" content="공유오피스 모던워크 | Modernwork" />
<meta property="og:description" content="경기 용인시 수지구 수지로 342번길 30, 현대프라자 5층" />
<meta property="og:image" content="https://growynn38-hub.github.io/modernwork-site/og_image.jpg" />
<meta property="og:url" content="https://growynn38-hub.github.io/modernwork-site/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="모던워크" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    justify-content: center;
    background: #f0ede8;
  }

  .page {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* 배경 사진 */
  .bg-photo {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: 100vh;
    object-fit: cover;
    object-position: center top;
    z-index: 0;
  }

  /* 상단 밝은 페이드 — 사진 위 텍스트 가독성 */
  .overlay-top {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    height: 55%;
    background: linear-gradient(to bottom, rgba(240,237,232,0.72) 0%, rgba(240,237,232,0.0) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* 하단 페이드 — 버튼 영역 */
  .overlay-bottom {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    height: 60%;
    background: linear-gradient(to top, rgba(240,237,232,0.96) 40%, rgba(240,237,232,0.0) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 56px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.1s;
  }

  .logo-wrap {
    width: 82px; height: 82px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(180,160,120,0.4);
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .brand-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #8a7a5a;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: 400;
  }

  .brand-kr {
    font-size: 19px;
    font-weight: 500;
    color: #2a2520;
    letter-spacing: 0.5px;
    margin-bottom: 7px;
  }

  .brand-sub {
    font-size: 11.5px;
    color: #8a8078;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.3px;
  }

  .gold-line {
    width: 28px; height: 1px;
    background: #b4a078;
    margin: 14px auto 0;
  }

  /* 주소 */
  .address {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 11px;
    color: #6a6058;
    font-weight: 300;
    margin-bottom: 28px;
    text-align: center;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.2s;
  }

  /* 연락처 버튼 */
  .contact-row {
    display: flex;
    gap: 8px;
    width: 100%;
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .contact-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 12px 4px;
    border-radius: 12px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(180,160,120,0.25);
    color: #2a2520;
    font-size: 11.5px;
    font-weight: 400;
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s, transform 0.15s;
  }
  .contact-btn:hover {
    background: rgba(255,255,255,0.92);
    transform: translateY(-1px);
  }
  .contact-btn svg { flex-shrink: 0; }

  /* 링크 버튼 */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 15px 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(180,160,120,0.2);
    color: #2a2520;
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s, transform 0.15s;
    opacity: 0;
  }
  .link-btn:hover {
    background: rgba(255,255,255,0.92);
    transform: translateY(-2px);
  }

  .link-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: rgba(180,160,120,0.12);
    display: flex; align-items: center; justify-content: center;
    margin-right: 13px;
    flex-shrink: 0;
  }
  .link-icon svg { width: 17px; height: 17px; }

  .link-text { flex: 1; }
  .link-title {
    font-size: 13.5px;
    font-weight: 500;
    color: #2a2520;
    margin-bottom: 1px;
  }
  .link-desc {
    font-size: 11px;
    color: #8a8078;
    font-weight: 300;
  }

  .link-arrow { color: #b4a078; font-size: 18px; margin-left: 6px; }

  .link-btn:nth-child(1) { animation: fadeUp 0.6s ease forwards 0.4s; }
  .link-btn:nth-child(2) { animation: fadeUp 0.6s ease forwards 0.5s; }
  .link-btn:nth-child(3) { animation: fadeUp 0.6s ease forwards 0.6s; }
  .link-btn:nth-child(4) { animation: fadeUp 0.6s ease forwards 0.7s; }

  .footer {
    margin-top: 32px;
    font-size: 10px;
    color: rgba(100,90,80,0.4);
    letter-spacing: 2px;
    text-transform: lowercase;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.85s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

          <path d="M2 4l6 5 6-5" stroke="#8a7a5a" stroke-width="1.3" stroke-linecap="round"/>

    <div class="links">
      <a class="link-btn" href="https://modernworkoffice.com" target="_blank">

      <a class="link-btn" href="https://blog.naver.com/modernwork_" target="_blank">

            <path d="M7 8h6M7 11h4" stroke="#b4a078" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="link-text">
          <div class="link-title">네이버 블로그</div>

      <a class="link-btn" href="https://www.instagram.com/modernwork_office" target="_blank">

    <div class="footer">modernworkoffice.com</div>

</div>
</body>
</html>
